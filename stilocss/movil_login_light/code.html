<body class="bg-surface min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
<!-- Ambient Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-72 h-72 rounded-full bg-primary/5 blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-80 h-80 rounded-full bg-secondary/5 blur-[100px]"></div>
<!-- Login Container -->
<main class="w-full max-w-md z-10">
<!-- Logo & Header Section -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-3xl signature-gradient shadow-[0px_12px_32px_rgba(115,48,230,0.15)] mb-6">
<span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">health_metrics</span>
</div>
<h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-br from-primary to-primary-dim bg-clip-text text-transparent">
                Cronos
            </h1>
<p class="text-on-surface-variant font-medium mt-2">Digital Sanctuary for Medical Care</p>
</div>
<!-- Form Card -->
<div class="bg-surface-container-lowest rounded-3xl p-8 shadow-[0px_20px_48px_rgba(115,48,230,0.04)]">
<h2 class="text-xl font-bold text-on-surface mb-8">Bienvenido de nuevo</h2>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-xl focus:ring-4 focus:ring-primary/10 text-on-surface placeholder:text-outline/60 font-medium transition-all outline-none" id="email" name="email" placeholder="doctor@cronos.med" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="password">Contraseña</label>
<a class="text-xs font-bold text-primary hover:text-primary-dim transition-colors" href="#">¿Olvidó su contraseña?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low border-none rounded-xl focus:ring-4 focus:ring-primary/10 text-on-surface placeholder:text-outline/60 font-medium transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-4 flex items-center cursor-pointer">
<span class="material-symbols-outlined text-outline text-lg hover:text-on-surface transition-colors">visibility</span>
</div>
</div>
</div>
<!-- Login Button -->
<button class="w-full signature-gradient text-on-primary py-4 rounded-xl font-bold text-lg shadow-[0px_12px_32px_rgba(115,48,230,0.12)] hover:shadow-[0px_16px_40px_rgba(115,48,230,0.2)] active:scale-95 transition-all duration-300 mt-4" type="submit">
                    Iniciar sesión
                </button>
</form>
<!-- Divider -->
<div class="relative my-8 flex items-center">
<div class="flex-grow h-[1px] bg-surface-container-highest"></div>
<span class="px-4 text-[10px] font-bold uppercase tracking-[0.2em] text-outline">Acceso biométrico</span>
<div class="flex-grow h-[1px] bg-surface-container-highest"></div>
</div>
<!-- Biometric Option -->
<button class="w-full flex items-center justify-center gap-3 py-4 rounded-xl bg-surface-container-low text-on-surface font-semibold hover:bg-surface-container transition-colors active:scale-95 duration-300">
<span class="material-symbols-outlined text-primary text-2xl">fingerprint</span>
<span>Usar Touch ID / Face ID</span>
</button>
</div>
<!-- Footer Links -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant font-medium">
                ¿No tienes una cuenta? 
                <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Contactar soporte</a>
</p>
<div class="flex justify-center gap-6 mt-8">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center cursor-pointer hover:bg-surface-container transition-all">
<span class="material-symbols-outlined text-on-surface-variant text-xl">language</span>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center cursor-pointer hover:bg-surface-container transition-all">
<span class="material-symbols-outlined text-on-surface-variant text-xl">help</span>
</div>
</div>
