</div>
<input class="w-full bg-slate-900/50 border-0 rounded-2xl py-4 pl-12 pr-4 text-white placeholder:text-outline focus:ring-2 focus:ring-primary/30 transition-all duration-300" placeholder="Enter your ID or Email" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-xs font-semibold text-on-surface-variant tracking-wider uppercase">Secure Access Key</label>
<a class="text-primary text-[10px] font-bold tracking-wider uppercase hover:text-primary-container transition-colors" href="#">Recover</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl" data-icon="lock">lock</span>
</div>
<input class="w-full bg-slate-900/50 border-0 rounded-2xl py-4 pl-12 pr-12 text-white placeholder:text-outline focus:ring-2 focus:ring-primary/30 transition-all duration-300" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-outline hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>

<button class="w-full signature-gradient text-white font-headline font-bold py-4 rounded-2xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2 mt-4">
<span>Initialize Session</span>
<span class="material-symbols-outlined text-xl" data-icon="login">login</span>

<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-outline-variant/20 to-transparent"></div>

<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-outline-variant/20 to-transparent"></div>
